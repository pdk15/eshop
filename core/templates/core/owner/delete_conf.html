{% extends 'core/base.html' %} {% load static %}{% block content %}
<link rel="stylesheet" href="{% static 'core/css/delete_conf.css' %}" />

<div class="manage-container">
  <h2>Delete Product</h2>
  <p>Are you sure you want to delete "{{ product.p_name }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'manage_prod' %}">Cancel</a>
  </form>
</div>
{% endblock %}
