{% extends 'core/base.html' %} {% load static %} {% block content %}

<link rel="stylesheet" href="{% static 'core/css/acc_service.css' %}" />

<div class="container">
  <h2 class="page-title">Accept Service Request</h2>

  <div class="form-card">
    <form method="POST">
      {% csrf_token %}

      <!-- Schedule Date -->
      <label for="schedule-date">Schedule Date</label>
      <input type="date" name="date" id="schedule-date" required />

      <!-- Schedule Time -->
      <label for="schedule-time">Schedule Time</label>
      <div class="time-select">
        <input type="time" name="time" id="schedule-time" required />
        <select name="ampm" required>
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button type="submit" class="btn save">
          <i class="fa fa-check"> </i> Accept Service
        </button>
        <a href="{% url 'service_requests' %}" class="btn back">⬅ Back</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
