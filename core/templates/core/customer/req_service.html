{% extends "core/customer/c_base.html" %} {% load static %} {% block content %}

<link
  rel="stylesheet"
  href="{% static 'core/css/cust_css/request_service.css' %}"
/>

<div class="card">
  <h2>Request Service</h2>

  <p class="product-name">
    <strong>Product:</strong>

    {% if item %} {{ item.product.p_name }} {% else %} General Service Request
    {% endif %}
  </p>

  <form method="post" class="service-form">
    {% csrf_token %} {{ form.as_p }}

    <div class="actions">
      <button type="submit" class="btn request"><i class="fas fa-paper-plane"> </i> Send Request</button>

      <a href="{% url 'manage_services' %}" class="btn back"><i class="fa fa-times"></i> Cancel </a>
    </div>
  </form>
</div>

{% endblock %}
